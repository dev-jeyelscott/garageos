services:
  postgres:
    image: postgres:16-alpine
    container_name: garageos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: garageos_dev
      POSTGRES_USER: garageos
      POSTGRES_PASSWORD: garageos_dev_password
    ports:
      - '5432:5432'
    volumes:
      - garageos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U garageos -d garageos_dev']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  garageos_postgres_data:
